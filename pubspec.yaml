name: trakto
description: Trakto - Track your subscriptions and audit their value.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.2.1
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.1

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI & theme
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Local storage (PIN, tema tercihi)
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Para birimi & formatlama
  intl: ^0.19.0
  currency_picker: ^2.0.19

  # CSV export
  csv: ^6.0.0
  share_plus: ^10.0.2
  path_provider: ^2.1.4

  # RevenueCat (Faz 4 için şimdiden dahil)
  purchases_flutter: ^8.0.0

  # Utility
  uuid: ^4.4.2
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/  

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0F0F14"
  image: assets/icons/app_icon.png
  color_dark: "#0F0F14"
  image_dark: assets/icons/app_icon.png
  android_12:
    color: "#0F0F14"
    image: assets/icons/app_icon.png
    color_dark: "#0F0F14"
    image_dark: assets/icons/app_icon.png
